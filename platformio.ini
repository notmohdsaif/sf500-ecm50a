; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.arduino.loopTaskStackSize = 16384
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
lib_deps =
    knolleary/PubSubClient           ; PubSubClient.h
    bblanchon/ArduinoJson @ ^6.21.5  ; ArduinoJson v6 (StaticJsonDocument API)
    4-20ma/ModbusMaster              ; ModbusMaster.h (ESP32 compatible)
    ; WebServer.h, DNSServer.h, Preferences.h, HTTPClient.h, vector - built-in to ESP32 framework
